<div class="page">
  <div class="toolbar">
    <button mat-raised-button color="primary" routerLink="/assets/new">
      Új eszköz
    </button>

    <mat-form-field class="search">
      <mat-label>Keresés (serial)</mat-label>
      <input matInput [formControl]="search" placeholder="pl. ABC123" />
    </mat-form-field>
  </div>

  <table mat-table [dataSource]="data" class="table">

    <ng-container matColumnDef="serialNumber">
      <th mat-header-cell *matHeaderCellDef>Serial</th>
      <td mat-cell *matCellDef="let a">{{ a.serialNumber }}</td>
    </ng-container>

    <ng-container matColumnDef="site">
      <th mat-header-cell *matHeaderCellDef>Site</th>
      <td mat-cell *matCellDef="let a">{{ a.site }}</td>
    </ng-container>

    <ng-container matColumnDef="type">
      <th mat-header-cell *matHeaderCellDef>Type</th>
      <td mat-cell *matCellDef="let a">{{ a.type }}</td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef></th>
      <td mat-cell *matCellDef="let a" class="actions">
        <button mat-button [routerLink]="['/assets', a.id, 'edit']">Szerkesztés</button>
        <button mat-button color="warn" (click)="delete(a.id)">Törlés</button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

  </table>

  <mat-paginator
    [length]="total"
    [pageSize]="pageSize"
    [pageSizeOptions]="[5,10,20]"
    (page)="onPageChange($event)">
  </mat-paginator>
</div>
