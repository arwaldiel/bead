<div class="page">
  <h2>{{ id ? 'Eszköz szerkesztése' : 'Új eszköz' }}</h2>

  <form [formGroup]="form" class="form">
    <mat-form-field>
      <mat-label>Serial Number</mat-label>
      <input matInput formControlName="serialNumber" />
    </mat-form-field>

    <mat-form-field>
      <mat-label>Site</mat-label>
      <input matInput formControlName="site" />
    </mat-form-field>

    <mat-form-field>
      <mat-label>Type</mat-label>
      <input matInput formControlName="type" />
    </mat-form-field>

    <mat-form-field>
      <mat-label>Manufacturer</mat-label>
      <input matInput formControlName="manufacturer" />
    </mat-form-field>

    <mat-form-field>
      <mat-label>Note</mat-label>
      <input matInput formControlName="note" />
    </mat-form-field>

    <div class="actions">
      <button mat-raised-button color="primary" type="button" (click)="save()">
        Mentés
      </button>
      <button mat-button type="button" routerLink="/assets">
        Mégse
      </button>
    </div>
  </form>
</div>
